pre-commit:
  parallel: true
  commands:
    lint-code:
      run: bunx biome check --write {staged_files} && bunx biome format --write {staged_files}
      glob: "*.{ts,tsx,js,jsx,astro,json}"
      stage_fixed: true

    lint-docs:
      run: bunx prettier --write {staged_files}
      glob: "*.{md,mdx}"
      stage_fixed: true

    format-yaml:
      run: bunx prettier --write {staged_files}
      glob: "*.{yml,yaml}"
      stage_fixed: true

pre-push:
  commands:
    lint:
      run: bun run lint

    tests:
      run: CI=true bun run test
