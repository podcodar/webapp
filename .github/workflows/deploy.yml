name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-deploy:
    runs-on: ubuntu-latest
    outputs:
      stack: ${{ steps.detect.outputs.stack }}
    steps:
      - id: detect
        run: |
          if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "stack=production" >> $GITHUB_OUTPUT
          else
            echo "stack=dev" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: detect-deploy
    runs-on: ubuntu-latest
    environment: cloudflare
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Applying infrastructure 🚀
        uses: pulumi/actions@v6
        with:
          cmd: up
          workDir: infra
          stack-name: ${{ needs.detect-deploy.outputs.stack }}
          cloud-url: s3://podcodar-pulumi-state?endpoint=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        env:
          # R2
          AWS_REGION: auto
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
