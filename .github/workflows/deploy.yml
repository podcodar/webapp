name: Deploy

# Runs after Quality gateway succeeds on main (merge or direct push).
on:
  workflow_run:
    workflows: [Quality gateway]
    types:
      - completed

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      # Required for Pulumi to access Cloudflare API
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Build Astro app (produces dist/ needed by Pulumi)
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run w:build

      # Pulumi infra update
      - name: Configure Pulumi
        uses: pulumi/actions@v5
        with:
          workDir: infra
          stack-name: webapp.production
          # Enables OIDC-based authentication (no long-lived secrets needed)
          cloud-url: puffinsystems
          # Use access token from env (set in repo secrets)
          # auth via PULUMI_ACCESS_TOKEN env var
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Pulumi up
        run: cd infra && bun run up
        env:
          # Pass Cloudflare credentials to Pulumi
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
